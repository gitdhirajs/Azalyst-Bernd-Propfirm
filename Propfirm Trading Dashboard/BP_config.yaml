# Blueprint Trading Dashboard Configuration -- Azalyst Propfirm edition
# ==========================================

# ============================================================
# FUNDINGPIPS 2-STEP PRO CHALLENGE -- $5,000 account (Phase 1)
# ============================================================
# 2026-07-13: switched from 1-Step to 2-Step Pro after the 1-Step account was
# lost to an unexpected daily-loss breach. Confirmed on fundingpips.com/trading-objectives:
# 2-Step Pro uses the SAME 3%/6% daily/total loss limits as the old 1-Step, so
# max_daily_loss_usd/max_total_loss_usd below are UNCHANGED. What changes is the
# profit target: two phases of 6% each (not one phase of 10%), unlimited time on both.
#   Account #2015868, MatchTrader. FP dashboard shows INR (~90:1 display
#   conversion of the USD figures) -- everything here is configured in USD.
#
#   Account size ........ $5,000
#   Max daily loss ...... $150   (3% of 5,000)   -> Rs 13,500 on the FP panel
#   Max total loss ...... $300   (6% static)     -> Rs 27,000 on the FP panel
#   Phase 1 target ...... $300   (6%)            -> Rs 27,000 on the FP panel
#   Phase 2 target ...... $300   (6%, same $ from the new phase-1 balance)
#   Min trading days .... none stated per-phase (unlimited time)
#
# When enabled, the paper trader blocks any trade that would breach the
# daily or total loss cap at submit time -- exactly what the broker does.
# Daily window resets at daily_reset_hour_utc (confirm against the
# "Resets In" countdown on your FP dashboard and adjust if it differs).
# Profit target is informational only (no enforcement) -- the engine blocks
# trades on a loss-cap breach, not on profit-target attainment.
#   Phase 1 (now):     profit_target_pct: 6.0    <-- 2-Step Pro phase-1 target ($300)
#   Funded (passed):   profit_target_pct: 0.0    (no target)
# NOTE: after you pass, update account_size + both caps to your funded size.
# ------------------------------------------------------------
prop_firm:
  enabled: true
  account_size: 5000.0
  max_daily_loss_usd: 150.0      # 3% of 5,000  = FP "Maximum Daily Loss" (Rs 13,500)
  max_total_loss_usd: 300.0      # 6% static     = FP "Maximum Loss"       (Rs 27,000)
  profit_target_pct: 6.0         # 2-Step Pro phase-1 target = 6% ($300 / Rs 27,000)
  daily_reset_hour_utc: 22       # 17:00 NY = 22:00 UTC. Confirm vs FP "Resets In" timer.

risk:
  # Used as fallback when prop_firm.enabled is false. When prop_firm is on,
  # `prop_firm.account_size` overrides account_balance for the paper trader.
  account_balance: 5000.0
  risk_per_trade_pct: 1.0          # 1% = $50 risk per trade on $5,000 -- IGNORED while fixed_lot_mode is on (below)
  reduced_risk_pct: 0.5            # Counter-trend & anticipatory: 0.5% = $25 (HAI Module 4)
  max_daily_loss_pct: 3.0          # 2-Step Pro daily cap (matches prop_firm.max_daily_loss_usd)
  max_total_loss_pct: 6.0          # 2-Step Pro static total cap (matches prop_firm.max_total_loss_usd)
  # 2026-07-13: user lost the prior 1-Step account to an unexpected daily-loss
  # breach. 1%-of-account risk sizing produces a VARIABLE lot size per trade
  # (wider stop = smaller lot, tighter stop = bigger lot), and several 1%
  # trades stacking same-day can chew through the 3% daily cap fast. Until a
  # trade is closed profitably, every signal (TAKE and CAUTION alike) is
  # forced to the platform's MINIMUM lot (0.01 -- confirmed on FundingPips
  # MatchTrader across FX/metals/indices/crypto, 2026-07-13) instead of the
  # risk_per_trade_pct calculation. This caps worst-case single-trade risk at
  # whatever 0.01 lot's stop-distance works out to (a few dollars), nowhere
  # near the $150 daily limit.
  # To size up: bump fixed_lot_multiplier (1 = 0.01 "1 lot", 2 = 0.02 "2 lot",
  # etc.) only AFTER you've closed at least one trade in profit on this
  # challenge. Set fixed_lot_mode: false to go back to full 1%-risk sizing.
  fixed_lot_mode: true
  fixed_lot_multiplier: 1.0
  # Cap removed (user request 2026-07-13): after a week live, max_open_positions=1
  # meant a single position occupied the only slot for 6 days and blocked every
  # other signal, producing zero track record. Raised to effectively unlimited so
  # every qualifying signal (>= alerts.min_composite_to_alert) gets paper-traded.
  # The REAL safety cap is submit_signal()'s aggregate-open-risk check in
  # BP_paper_trader.py: it refuses any new trade once (realized_today_loss +
  # sum of open-position risk + this trade's risk) >= max_daily_loss_usd ($150),
  # so full-1% TAKE trades still self-limit at ~3 concurrent (3 x $50 = $150)
  # regardless of this number. CAUTION trades are sized at the min lot so many
  # more of those can stack without threatening the cap.
  max_open_positions: 20

# ============================================================
# ALERTS -- Discord signal quality filter + skip/take verdict
# ============================================================
# Only Discord-alert (and @ping) signals whose zone composite score is
# >= min_composite_to_post. Raises the quality bar so you stop getting
# medium / already-moved setups (e.g. the EURCHF 5.8 zone). Every alert
# that DOES post also carries a [TAKE]/[CAUTION]/[SKIP] verdict + a
# location note (AT ZONE vs PENDING) so you always get an explicit
# skip-or-take call. Lower this number to see more setups.
#   7.0 = only high-quality zones (recommended)
#   6.0 = high + upper-medium
#   0.0 = everything (each still labelled with its verdict)
# Env override: AZALYST_MIN_COMPOSITE
#
# Two-tier alerting:
#   min_composite_to_post  (7.0) = the TAKE bar. Signals >= this get @pinged
#       AND are auto paper-traded. These are the actionable trades.
#   min_composite_to_alert (5.5) = the SHOW bar. Signals in [alert, post) are
#       CAUTION: shown in Discord (with a [CAUTION] tag) for your awareness but
#       NOT @pinged and NOT paper-traded. Below min_composite_to_alert = SKIP
#       (hidden except as an FYI count).
# ------------------------------------------------------------
alerts:
  min_composite_to_post: 7.0
  min_composite_to_alert: 5.5

# ============================================================
# INSTRUMENT SPECS -- used to turn a $ risk into a MatchTrader LOT SIZE
# ============================================================
# The alert must tell you the exact volume to type into FundingPips. That
# conversion needs each instrument's contract size:
#
#   lots = risk_usd / (stop_distance * usd_value_per_point_per_lot)
#
# FOREX is broker-INDEPENDENT: 1 lot = 100,000 base units and the per-point
# USD value is derived from the live rate, so those specs are `verified: true`.
#
# Everything else (metals, indices, energies, crypto) has a broker-specific
# contract size. The values below are the COMMON MatchTrader defaults but are
# flagged `verified: false` -- the alert prints a "CONFIRM on ticket" note for
# them. To verify: open the order ticket on FundingPips, read the contract
# size for that symbol, set it here, and flip `verified: true`.
# ------------------------------------------------------------
instrument_specs:
  # Values below are standard MatchTrader / CFD contract units (FundingPips runs
  # on MatchTrader). FundingPips' live spec page blocks automated reads, so the
  # STANDARDIZED full-lot commodity/crypto units (100 oz gold, 5000 oz silver,
  # 1000 bbl oil, 1 coin crypto) and the standard $1-per-point US index are set
  # verified:true. Broker-VARIABLE ones -- copper, natgas, refined products, and
  # all NON-USD indices (point value is in the index's LOCAL currency and needs
  # live FX conversion the sizer does not apply) -- stay verified:false so the
  # alert keeps its "confirm on ticket" note. Every alert ALSO prints "set
  # platform Risk Mode = 1%"; THAT is the authoritative sizing -- these values
  # are only a cross-check. Confirm metals + indices on one MatchTrader ticket.
  defaults_by_class:
    forex:           { contract_size: 100000, min_lot: 0.01, lot_step: 0.01, verified: true }
    precious_metals: { contract_size: 100,    min_lot: 0.01, lot_step: 0.01, verified: true }   # gold/platinum/palladium: 100 oz/lot
    energies:        { contract_size: 1000,   min_lot: 0.01, lot_step: 0.01, verified: false }  # WTI/Brent overridden below; natgas/refined vary
    equity_indices:  { contract_size: 1, point_value_per_lot: 1, min_lot: 0.1, lot_step: 0.1, verified: false }  # US overridden below; non-USD stay unverified (FX)
    commodities:     { contract_size: 1, point_value_per_lot: 1, min_lot: 0.01, lot_step: 0.01, verified: false }
    crypto:          { contract_size: 1, min_lot: 0.01, lot_step: 0.01, verified: true }   # 1 coin/lot ($1 move = $1/lot)
    equities:        { contract_size: 1, min_lot: 1, lot_step: 1, verified: true }
    interest_rates:  { contract_size: 1, point_value_per_lot: 1, min_lot: 0.1, lot_step: 0.1, verified: false }
  # Per-symbol overrides keyed by the broker `name` from the watchlist.
  overrides:
    # -- Precious metals (standard full-lot ounce units) --
    "XAGUSD (Silver)":     { contract_size: 5000, verified: true }    # 5000 oz/lot ($1 move = $5000/lot)
    "XCUUSD (Copper)":     { contract_size: 1000, verified: false }   # unit varies by broker -- confirm on ticket
    # -- Energies -- WTI/Brent are 1000 bbl/lot; natgas + refined products vary --
    "USOIL (WTI Crude)":   { contract_size: 1000, point_value_per_lot: 1000, verified: true }   # 1000 bbl/lot
    "UKOIL (Brent Crude)": { contract_size: 1000, point_value_per_lot: 1000, verified: true }   # 1000 bbl/lot
    "NATGAS (Natural Gas)":  { verified: false }   # 1 lot ~10,000 MMBtu on MatchTrader -- confirm on ticket
    "HEATOIL (Heating Oil)": { verified: false }   # priced $/gal, ~42,000 gal/lot -- confirm on ticket
    "GASOLINE (RBOB)":       { verified: false }   # priced $/gal, ~42,000 gal/lot -- confirm on ticket
    # -- US equity indices: MT5/MatchTrader standard = $1 per index point per lot.
    #    Keys MUST match the watchlist `name` EXACTLY. MT5-SIM1 live symbols
    #    (confirmed 2026-07-14): SPX500 / NDX100 / DJI30 (US500/US100/US30 do
    #    NOT exist on MT5). --
    "SPX500 (S&P 500)":    { point_value_per_lot: 1, verified: true }
    "NDX100 (Nasdaq 100)": { point_value_per_lot: 1, verified: true }
    "DJI30 (Dow Jones)":   { point_value_per_lot: 1, verified: true }
    "US2000 (Russell)":    { point_value_per_lot: 1, verified: true }
    # -- Non-USD indices (GER40/UK100/JP225/AUS200/HK50/FRA40/ESP35/EU50/SUI30):
    #    left on the class default (verified:false) -- point value is in the
    #    index's local currency; confirm + apply the FX conversion on the ticket.

# ============================================================
# STRATEGY -- which income-strategy timeframe(s) to scan
# ============================================================
# - active_strategy:   global default when a watchlist entry has no
#                      `strategies` field. The legacy single-pass mode.
# - default_strategies: list of strategies to scan PER SYMBOL when the
#                       entry has no override. Each name maps to an
#                       (HTF, LTF) pair via STRATEGY_TIMEFRAMES in
#                       run_scanner.py. For the FundingPips monthly
#                       competition we want BOTH 'weekly' (htf=1wk, ltf=1d)
#                       and 'daily' (htf=1d, ltf=60m) so we catch big
#                       swings AND short-hold daily setups.
# - Per-watchlist `strategies: [...]` field overrides this default.
#   Crypto entries are pinned to ['daily'] only -- weekly bars on crypto
#   are too few/volatile to be meaningful per the methodology audit.
# ------------------------------------------------------------
active_strategy: "weekly"
default_strategies: ["weekly", "daily"]

