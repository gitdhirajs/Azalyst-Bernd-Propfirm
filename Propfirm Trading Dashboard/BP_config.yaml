# ============================================================
# ENTRY DISTANCE GATE -- Phase 46 (2026-06-23)
# ============================================================
# Phase 44 removed the in_zone gate so the engine fires E1 PENDING limit
# orders at zone proximal even when price is not yet there. Without a cap
# the live scanner flagged historical zones 30-60% away from current price
# (Silver entry 23.76 while spot 62.37, BTC entry 42k while spot 62k, etc.)
# Bernd places limit orders for zones price is approaching, not zones that
# are years away. We re-introduce a distance cap measured in R-multiples
# of the stop distance (= zone height + Fib extension), so the cap scales
# with each asset's volatility automatically.
#
#   pending signal allowed if  |close - entry| / |stop - entry|  <=  max_r
#
# Tuning rationale per income strategy (HTF bar size determines arrival window):
#   weekly  (HTF=1wk): allow up to 3R -- price often takes weeks to arrive
#   daily   (HTF=1d):  allow up to 2R -- shorter window, tighter cap
#   monthly (HTF=1mo): allow up to 5R -- multi-month positions, wider zones
#   intraday(HTF=60m): allow up to 1.5R -- entries must be very close
# default_max_r is used when income_strategy is missing.
# ------------------------------------------------------------
entry_distance:
  # Primary cap: R-multiples of the stop distance (scales with volatility).
  default_max_r: 3.0
  max_r_to_entry_pending:
    weekly:   3.0
    daily:    2.0
    monthly:  5.0
    intraday: 1.5
  # Secondary cap: raw % distance from current price to entry. Catches the
  # WIDE-zone blind spot of the R cap -- e.g. an equity weekly demand zone so
  # wide that price sitting 23% away is still <3R. A signal is rejected if it
  # exceeds EITHER cap. A weekly income limit waits for a pullback of a few
  # %, not 15-25%; deeper than this is a historical zone, not an approach.
  default_max_pct: 15.0
  max_pct_to_entry:
    weekly:   15.0
    daily:    8.0
    monthly:  25.0
    intraday: 4.0

cot:
  lookback_weeks: 52
  upper_extreme: 80
  lower_extreme: 20

valuation:
  length: 10                          # default ROC ("cycle" period)
  rescale_length: 100
  overvalued_threshold: 75
  undervalued_threshold: -75
  # NOTE: the references field below is NOT consumed by run_scanner.py or goldtest.
  # The scanner uses the hardcoded VALUATION_REFS dict keyed by asset_class.
  # This field exists for documentation only; editing it has NO effect on scans.
  # Phase 38 GAP-40: left in place for documentation, flagged explicitly as unused.
  references_documentation_only: ["DX-Y.NYB", "GC=F", "ZB=F"]
  # Per-symbol cycle (ROC) override -- Bernd's "30/10/13-day cycles" are
  # just the Valuation indicator with different ROC periods (Hybrid AI
  # 1:53:38). Phase 24: populated per the cheatsheet + course transcripts.
  cycle_per_symbol:
    # Mega-cap tech daily trend-following (HAI 0:59:34, Ch.117 CW41)
    AAPL:  30
    MSFT:  30
    GOOG:  30
    GOOGL: 30
    META:  30
    AMZN:  30
    NFLX:  30
    NVDA:  30
    TSLA:  30
    # Equity index futures: 10-day for daily reads, 13-day for weekly end-of-bend.
    # Phase 38 GAP-31 fix: YM=F daily should be 30 (trend-following, Ch17 [1:22:45]
    # "30 here we get another setup... work a lot more accurate" + Cheatsheet
    # "30 & 10-d-cycles trend following"). 13 is the weekly end-of-bend value only;
    # applying it to daily scans gives the wrong ROC period. Set to 30 (preferred
    # daily) as interim fix until timeframe-aware {daily:30, weekly:13} dict is
    # implemented (GAP-14/GAP-15 deferred architecture).
    NQ=F:  10
    ES=F:  10
    YM=F:  30          # DOW daily trend-following (Ch17 + Cheatsheet); was 13 (weekly only) -- Phase 38 fix
    RTY=F: 10
    # Forex (10-day matches Pine Script default; documented for clarity)
    6E=F:  10
    6B=F:  10
    6J=F:  10
    6S=F:  10
    EURUSD=X: 10
    GBPUSD=X: 10
    USDJPY=X: 10
    USDCHF=X: 10
    # Precious metals: Gold confirmed ROC=13 from CW45 Nov 2023 (frame_000644) +
    # chunk4 CW38 Oct 2023. Silver ROC=30 from CW11 Mar 2024 (frame_000841).
    # Other PMs at 10 default (no frame evidence for different value).
    GC=F:  13   # Phase 41 chunk5 F-18: CW45 label shows ROC=13 confirmed
    SI=F:  30   # Phase 41 chunk5 F-11/chunk4: CW11 frame_000841 label shows ROC=30
    PL=F:  10
    PA=F:  10
    CL=F:  10
    # Agricultural commodities: ROC=30 confirmed for ZS=F (CW05 frame_000809)
    # and ZC=F (CW07 frame_001082). ZW=F not yet confirmed -- set 30 for consistency.
    ZS=F:  30   # Phase 41 chunk5 F-12: CW05 Soybeans label shows ROC=30
    ZC=F:  30   # Phase 41 chunk5 F-05: CW07 Corn label shows ROC=30
    ZW=F:  30   # Wheat: same class as ZS/ZC, no direct frame confirmation but consistent
