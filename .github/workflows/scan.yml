name: Scan markets (hourly)

# Runs the Azalyst Propfirm scanner EVERY HOUR from a GitHub Actions runner so a
# fresh signal is caught close to its actual price (a zone can form and fill
# within a 4h gap). This repo is PUBLIC, so Actions minutes are free/unlimited.
# The scanner produces paper signals for the live Fundingpips $5k challenge
# ($150 daily / $300 total loss caps enforced in BP_paper_trader.py). After
# scanning it posts a Discord summary (@ping on TAKE signals; CAUTION signals
# shown but not pinged/traded) and commits the small state files back to main.
#
# Required repository secrets (Settings -> Secrets and variables -> Actions):
#   DISCORD_WEBHOOK_URL   -- Discord webhook for the channel to post to
#   DISCORD_USER_ID       -- your Discord snowflake ID for @-pings on TAKE signals

# Cron runs at :17 past every hour. The :17 minute (not :00) avoids the
# top-of-hour GitHub Actions congestion where scheduled events get dropped.
# The 00:17 UTC slot is historically the most likely to be skipped, but with 24
# hourly slots losing the odd one is harmless (the next hour catches up). Runs
# take ~7-12 min and hours are 60 min apart, so they never overlap.
on:
  schedule:
    - cron: '17 * * * *'
  workflow_dispatch:               # manual trigger from the Actions tab

# Only one scan at a time -- avoids two runs racing on the commit-back step.
# Queue subsequent runs rather than cancel so we don't drop the cron beat.
concurrency:
  group: scan-markets
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    permissions:
      contents: write              # required to commit updated state files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true   # keep the GITHUB_TOKEN for the push step

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: 'Propfirm Trading Dashboard/requirements.txt'

      - name: Install dependencies
        run: pip install -r "Propfirm Trading Dashboard/requirements.txt"

      - name: Run scanner (headless)
        working-directory: Propfirm Trading Dashboard
        run: python run_scanner.py --no-open --all-strategies
        # --all-strategies: runs both weekly (HTF=1wk) and daily (HTF=1d) in one pass,
        # merges signals from both timeframes into a single scan_results.json.
        # --no-open skips the browser launch + dashboard HTTP server.
        # The scanner writes scan_results.json, scan_history.json, and
        # paper_trader_state.json on disk; the next step picks them up.

      - name: Post Discord summary
        working-directory: Propfirm Trading Dashboard
        env:
          DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
          DISCORD_USER_ID: ${{ secrets.DISCORD_USER_ID }}
        run: python send_discord.py
        # send_discord.py silently no-ops if DISCORD_WEBHOOK_URL is unset,
        # so the workflow still succeeds even before you configure secrets.

      - name: Commit updated state files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # scan_results.json is intentionally NOT committed -- it's ~23MB
          # (OHLCV cache for dashboard charts) and only needs to persist
          # within this workflow run. The 3 files below are small and
          # carry the state that must survive to the next hourly run.
          # Add each file individually with its own `|| true`: a single
          # `git add -f a b c` aborts atomically (stages NOTHING) if any one
          # pathspec is missing -- e.g. discord_state.json only exists once
          # DISCORD_WEBHOOK_URL is configured. That would silently stop
          # persisting the paper account state. (Matches scan_allcoins.yml.)
          git add -f "Propfirm Trading Dashboard/paper_trader_state.json" || true
          git add -f "Propfirm Trading Dashboard/scan_history.json" || true
          git add -f "Propfirm Trading Dashboard/discord_state.json" || true
          if git diff --staged --quiet; then
            echo "No state file changes to commit."
          else
            git commit -m "scan: hourly state update [skip ci]"
            # Pull --rebase --autostash protects against the rare case where
            # someone pushed between this run's checkout and this commit.
            git pull --rebase --autostash origin main
            git push
          fi
